name: Update Formula on PyPI Release

on:
  schedule:
    # Check for new PyPI releases every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v6

      - name: Get latest PyPI version
        id: pypi
        run: |
          LATEST_JSON=$(curl -s https://pypi.org/pypi/vibepod/json)
          LATEST=$(echo "$LATEST_JSON" | jq -r '.info.version')
          CURRENT=$(grep -oP 'vibepod-\K[0-9.]+(?=\.tar\.gz)' Formula/vibepod.rb | head -1)
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Latest: $LATEST | Current: $CURRENT"

      - name: Update formula if version changed
        if: steps.pypi.outputs.latest != steps.pypi.outputs.current
        env:
          NEW_VERSION: ${{ steps.pypi.outputs.latest }}
        run: |
          # Get the actual sdist URL from the PyPI API (hash-based path, not /source/)
          URL=$(curl -s https://pypi.org/pypi/vibepod/json | jq -r --arg ver "$NEW_VERSION" '.releases[$ver][] | select(.packagetype == "sdist") | .url')
          SHA256=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')

          # Update the main package URL (matches the hash-based pypi path)
          sed -i "s|url \"https://files.pythonhosted.org/packages/.*/vibepod-.*\.tar\.gz\"|url \"${URL}\"|" Formula/vibepod.rb

          # Update the sha256 on the line immediately following the main package url
          awk -v sha="$SHA256" '
            /url.*vibepod-[0-9]+\.[0-9]+/ { found=1 }
            found && /^  sha256/ { sub(/"[^"]*"/, "\"" sha "\""); found=0 }
            { print }
          ' Formula/vibepod.rb > /tmp/vibepod_formula.rb && mv /tmp/vibepod_formula.rb Formula/vibepod.rb

          echo "Updated to $NEW_VERSION (sha256: $SHA256)"

      - name: Open PR with update
        if: steps.pypi.outputs.latest != steps.pypi.outputs.current
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "vibepod ${{ steps.pypi.outputs.latest }}"
          title: "Update vibepod to ${{ steps.pypi.outputs.latest }}"
          body: |
            Auto-generated update from PyPI.

            - **Version:** `${{ steps.pypi.outputs.current }}` → `${{ steps.pypi.outputs.latest }}`
            - **PyPI:** https://pypi.org/project/vibepod/${{ steps.pypi.outputs.latest }}/

            After merging, run locally to refresh dependency resources:
            ```
            brew update-python-resources Formula/vibepod.rb
            ```
          branch: "auto-update/vibepod-${{ steps.pypi.outputs.latest }}"
          delete-branch: true
